version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commerceops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: commerceops-redis
    ports:
      - "6379:6379"
    networks:
      - commerceops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - commerceops-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-services
    ports:
      - "${AUTH_SERVICE_PORT}:8001"
    env_file:
      - .env
    networks:
      - commerceops-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  order-service:
    build: ./services/order-services
    ports:
      - "${ORDER_SERVICE_PORT}:8002"
    env_file:
      - .env
    networks:
      - commerceops-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai-recommendation-service:
    build: ./services/ai-recommendation-service
    ports:
      - "${AI_SERVICE_PORT}:8003"
    env_file:
      - .env
    networks:
      - commerceops-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker-service:
    build: ./services/worker-service
    ports:
      - "${WORKER_SERVICE_PORT}:8004"
    env_file:
      - .env
    networks:
      - commerceops-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  api-service:
    build: ./services/api-services
    ports:
      - "${API_SERVICE_PORT}:8000"
    env_file:
      - .env
    networks:
      - commerceops-net
    depends_on:
      auth-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      ai-recommendation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./services/frontend
    container_name: commerceops-frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    env_file:
      - .env
    networks:
      - commerceops-net

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    networks:
      - commerceops-net
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-service

  prometheus:
    image: prom/prometheus:latest
    container_name: commerceops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - commerceops-net

  grafana:
    image: grafana/grafana:latest
    container_name: commerceops-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - commerceops-net
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: commerceops-node-exporter
    ports:
      - "9100:9100"
    networks:
      - commerceops-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: commerceops-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - commerceops-net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  commerceops-net:
    driver: bridge
