apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: commerceops
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: frontend
          # Replace with your ECR image URI after Jenkins pushes a build, e.g.:
          # <account_id>.dkr.ecr.<region>.amazonaws.com/commerceops/frontend:latest
          image: commerceops/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: commerceops-config
            - secretRef:
                name: commerceops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: commerceops
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
