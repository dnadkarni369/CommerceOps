# Uses Traefik, which ships built-in with k3s. If deploying to a vanilla
# cluster instead, install ingress-nginx and change the ingressClassName.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerceops-ingress
  namespace: commerceops
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
