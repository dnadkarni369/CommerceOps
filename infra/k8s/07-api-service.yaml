apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: commerceops
  labels:
    app: api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-service
          # Replace with your ECR image URI after Jenkins pushes a build, e.g.:
          # <account_id>.dkr.ecr.<region>.amazonaws.com/commerceops/api-service:latest
          image: commerceops/api-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: commerceops-config
            - secretRef:
                name: commerceops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: commerceops
spec:
  selector:
    app: api-service
  ports:
    - port: 8000
      targetPort: 8000
