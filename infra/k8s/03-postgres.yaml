# Self-hosted Postgres for the k3s deploy path (use RDS instead for the
# Terraform/EC2 path - see infra/terraform/rds.tf). Kept as a StatefulSet
# here so the cluster demo is fully self-contained without needing AWS RDS.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: commerceops
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: commerceops-config
            - secretRef:
                name: commerceops-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "commerceops"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: commerceops
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
