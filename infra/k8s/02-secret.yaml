# DO NOT commit real values here. This is a template - generate the real
# manifest at deploy time, e.g.:
#
#   kubectl create secret generic commerceops-secrets \
#     --namespace=commerceops \
#     --from-literal=POSTGRES_USER=commerceops \
#     --from-literal=POSTGRES_PASSWORD=<strong-password> \
#     --from-literal=JWT_SECRET_KEY=<long-random-string> \
#     --from-literal=RABBITMQ_USER=commerceops \
#     --from-literal=RABBITMQ_PASSWORD=<strong-password> \
#     --dry-run=client -o yaml > 02-secret.local.yaml
#
# For production, prefer AWS Secrets Manager + the External Secrets
# Operator instead of plain k8s Secrets (which are only base64-encoded,
# not encrypted, unless you enable KMS-backed encryption at rest).
apiVersion: v1
kind: Secret
metadata:
  name: commerceops-secrets
  namespace: commerceops
type: Opaque
stringData:
  POSTGRES_USER: "commerceops"
  POSTGRES_PASSWORD: "changeme_replace_before_apply"
  JWT_SECRET_KEY: "changeme_replace_before_apply"
  RABBITMQ_USER: "commerceops"
  RABBITMQ_PASSWORD: "changeme_replace_before_apply"
