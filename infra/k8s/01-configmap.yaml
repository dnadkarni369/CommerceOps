apiVersion: v1
kind: ConfigMap
metadata:
  name: commerceops-config
  namespace: commerceops
data:
  APP_ENV: "production"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "commerceops"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_QUEUE: "order_queue"
  JWT_ALGORITHM: "HS256"
  API_SERVICE_PORT: "8000"
  AUTH_SERVICE_PORT: "8001"
  ORDER_SERVICE_PORT: "8002"
  AI_SERVICE_PORT: "8003"
  WORKER_SERVICE_PORT: "8004"
  FRONTEND_PORT: "3000"
