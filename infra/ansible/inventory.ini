# Populate this after `terraform apply` - either by hand or by piping
# `terraform output -json` into a small script. Example static entry:
#
# [app_servers]
# app-1 ansible_host=1.2.3.4
#
# For a dynamic setup, use the amazon.aws.aws_ec2 inventory plugin instead,
# filtering on the "Name" tag set by Terraform (commerceops-asg-instance).

[app_servers]
# app-1 ansible_host=REPLACE_WITH_EC2_PUBLIC_IP

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
